<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #aaa;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 6px;
    }

      p {
      font-size: 0.85rem;
      color: #444;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 60px 20px;
      font-size: 0.7rem;
      color: #222;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      opacity: 5; /* adjust for visibility */
      filter: grayscale(100%) contrast(120%) brightness(60%);
    }

    </style>
</head>
<body>
    <header>
        <h1> MERCH </h1>
    </header>
    <footer>
        <p>© BLAIRE</p>
    </footer>
</body>

<video autoplay muted loop playsinline class="bg-video">
  <source src="WEBSITE VIDEO.mp4" type="video/mp4">
</video>

</html>
