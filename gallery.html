<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: #aaa;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px;
      background: rgba(0,0,0,0.7);
    }

    nav a img {
      width: 22px;
      opacity: 0.5;
      transition: 0.3s ease;
    }

    nav a img:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 160px;
      opacity: 0.85;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.15));
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 6px;
    }

    section {
      max-width: 600px;
      margin: 120px auto;
      text-align: center;
      padding: 0 20px;
    }

    h2 {
      font-size: 0.8rem;
      letter-spacing: 4px;
      color: #555;
      margin-bottom: 20px;
    }

    p {
      font-size: 0.85rem;
      color: #444;
      line-height: 1.6;
    }

    iframe {
      width: 100%;
      height: 300px;
      opacity: 0.6;
      border: none;
      transition: 0.3s;
    }

    iframe:hover {
      opacity: 1;
    }

    .gallery img {
      width: 100%;
      margin-top: 20px;
      opacity: 1;
      transition: 0.3s;
    }

    .gallery img:hover {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 60px 20px;
      font-size: 0.7rem;
      color: #222;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      opacity: 5; /* adjust for visibility */
      filter: grayscale(100%) contrast(120%) brightness(60%);
    }

    .gallery-row {
      display: flex;
      justify-content: center;   /* center them horizontally */
      align-items: center;
      gap: 40px;                 /* space between images */
      padding: 40px 0;
    }

    .gallery-row img {
      width: 120px;              /* adjust size */
      height: auto;
    }
    
    </style>
</head>
<body>

  <header>
    <h1> ARCHIVE</h1>
  </header>

<section class="gallery-row">
  <img src="geralt-abstract-10243433.jpg" alt="gal1">
  <img src="geralt-dance-10239719.jpg" alt="gal2">
  <img src="geralt-silhouette-10239692.jpg" alt="gal3">
</section>


  <footer>
    <p>© BLAIRE</p>
  </footer>
</body>

<video autoplay muted loop playsinline class="bg-video">
  <source src="WEBSITE VIDEO.mp4" type="video/mp4">
</video>

</html>
